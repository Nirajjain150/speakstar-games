<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SpeakStar - Plural Challenge!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Trebuchet MS',Arial,sans-serif;background:linear-gradient(135deg,#00838F,#004D40);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;overflow-x:hidden}
.header{text-align:center;color:#fff;margin-bottom:15px}.header h1{font-size:2.2em;text-shadow:2px 2px 4px rgba(0,0,0,.3)}
.game{background:#fff;border-radius:20px;padding:25px;max-width:700px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.2)}
.word-card{background:linear-gradient(135deg,#E0F7FA,#B2EBF2);border-radius:16px;padding:20px;margin:15px 0;text-align:center}
.singular{font-size:1.1em;color:#888;margin-bottom:5px}
.word{font-size:2.5em;font-weight:bold;color:#00838F}
.arrow{font-size:2em;color:#FF6B6B;margin:8px 0}
.prompt{font-size:1.2em;color:#2D3436;font-weight:bold}
.choices{display:flex;gap:12px;justify-content:center;margin:20px 0;flex-wrap:wrap}
.choice{padding:16px 28px;border:3px solid #e0e0e0;border-radius:14px;font-size:1.3em;font-weight:bold;cursor:pointer;transition:all .25s;background:#fff;min-width:130px;text-align:center}
.choice:hover{transform:scale(1.08);box-shadow:0 4px 15px rgba(0,0,0,.1);border-color:#00838F}
.choice.correct{border-color:#66BB6A;background:#E8F5E9;color:#2E7D32;transform:scale(1.1)}
.choice.wrong{border-color:#FF6B6B;background:#FBE9E7;color:#C62828;animation:shake .4s}
.choice.disabled{pointer-events:none;opacity:.4}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.rule{background:#FFF8E1;border-radius:10px;padding:10px;margin:10px 0;font-size:.95em;color:#F57F17;text-align:center;border-left:4px solid #FFB74D}
.progress{display:flex;gap:6px;justify-content:center;margin:10px 0}
.dot{width:16px;height:16px;border-radius:50%;background:#eee;transition:.3s}.dot.done{background:#66BB6A}.dot.current{background:#FFD54F;transform:scale(1.3)}
.fb{text-align:center;font-size:1.2em;font-weight:bold;min-height:40px;margin:10px 0}
.score{text-align:center;font-size:1.8em;margin:8px 0}
.speak{background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border-radius:12px;padding:12px;margin:10px 0;text-align:center;border:2px dashed #66BB6A;font-size:1em}
.btn{padding:14px 30px;border:none;border-radius:14px;font-size:1.1em;font-weight:bold;cursor:pointer;transition:.2s;margin:5px}
.btn:hover{transform:scale(1.05)}
.btn-play{background:linear-gradient(135deg,#00838F,#004D40);color:#fff}
.celebration{font-size:3.5em;text-align:center;animation:bounce .6s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.confetti{position:fixed;top:-10px;pointer-events:none;z-index:9999}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
.hook{background:linear-gradient(135deg,#E0F7FA,#B2EBF2);border-radius:12px;padding:15px;margin:15px 0;text-align:center;border:2px solid #4DD0E1}
</style>
</head>
<body>
<div class="header"><h1>🔢 Plural Challenge! 🔢</h1><p>One cat, two cats! Make words plural!</p></div>
<div class="game" id="game"></div>
<script>
const AudioCtx=window.AudioContext||window.webkitAudioContext;let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new AudioCtx()}
function playCorrect(){initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='sine';o.frequency.setValueAtTime(523,audioCtx.currentTime);o.frequency.setValueAtTime(659,audioCtx.currentTime+.1);o.frequency.setValueAtTime(784,audioCtx.currentTime+.2);g.gain.setValueAtTime(.3,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+.4);o.start();o.stop(audioCtx.currentTime+.4)}
function playWrong(){initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='sawtooth';o.frequency.setValueAtTime(200,audioCtx.currentTime);o.frequency.setValueAtTime(150,audioCtx.currentTime+.15);g.gain.setValueAtTime(.15,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+.3);o.start();o.stop(audioCtx.currentTime+.3)}
function playCelebration(){initAudio();[523,659,784,1047].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.2,audioCtx.currentTime+i*.15);g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+i*.15+.3);o.start(audioCtx.currentTime+i*.15);o.stop(audioCtx.currentTime+i*.15+.3)})}
function showConfetti(n=30){const colors=['#FF6B6B','#FFD54F','#66BB6A','#7E57C2','#00BCD4','#FF9800','#E91E63'];for(let i=0;i<n;i++){const c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'vw';c.style.background=colors[Math.floor(Math.random()*colors.length)];c.style.width=(Math.random()*8+6)+'px';c.style.height=c.style.width;c.style.borderRadius=Math.random()>.5?'50%':'2px';c.style.animation=`fall ${Math.random()*2+1.5}s linear forwards`;c.style.animationDelay=Math.random()*.5+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),4000)}}

const questions=[
  {word:"cat",choices:["cats","cates","catties"],correct:0,rule:"Just add -s!",speak:'"I have two cats at home!"'},
  {word:"box",choices:["boxs","boxes","boxies"],correct:1,rule:"Box ends in X → add -es!",speak:'"There are three boxes on the table!"'},
  {word:"glass",choices:["glasss","glasses","glassies"],correct:1,rule:"Glass ends in SS → add -es!",speak:'"She has two glasses of water."'},
  {word:"dog",choices:["dogs","doges","doggies"],correct:0,rule:"Just add -s!",speak:'"I see five dogs in the park!"'},
  {word:"brush",choices:["brushs","brushes","brushies"],correct:1,rule:"Brush ends in SH → add -es!",speak:'"We need two brushes for painting!"'},
  {word:"book",choices:["bookes","bookies","books"],correct:2,rule:"Just add -s!",speak:'"I read four books this week!"'},
  {word:"watch",choices:["watches","watchs","watchies"],correct:0,rule:"Watch ends in CH → add -es!",speak:'"My parents have two watches."'},
  {word:"ball",choices:["balles","balls","ballies"],correct:1,rule:"Just add -s!",speak:'"We played with three balls!"'},
  {word:"bus",choices:["buss","buses","busies"],correct:1,rule:"Bus ends in S → add -es!",speak:'"I saw two buses on the road!"'},
  {word:"star",choices:["stars","stares","starries"],correct:0,rule:"Just add -s! You are a star!",speak:'"There are a million stars in the sky!"'},
];
let cur=0,score=0,streak=0,answered=false;
function render(){
  if(cur>=questions.length){showEnd();return}
  answered=false;const q=questions[cur];
  const dots=questions.map((_,i)=>`<div class="dot ${i<cur?'done':''} ${i===cur?'current':''}"></div>`).join('');
  document.getElementById('game').innerHTML=`
    <div class="progress">${dots}</div>
    <div style="text-align:center;font-size:.9em;color:#888">Question ${cur+1} of ${questions.length}${streak>=3?' <span style="background:#FF6F00;color:#fff;padding:2px 10px;border-radius:12px;font-size:.85em">🔥 ${streak} streak!</span>':''}</div>
    <div class="word-card">
      <div class="singular">If there is one, we say:</div>
      <div class="word">1 ${q.word}</div>
      <div class="arrow">⬇️</div>
      <div class="prompt">If there are many, we say:</div>
    </div>
    <div class="choices">${q.choices.map((c,i)=>`<div class="choice" onclick="pick(${i})">${c}</div>`).join('')}</div>
    <div class="fb" id="fb"></div>
    <div class="score">${'⭐'.repeat(score)}${'☆'.repeat(questions.length-score)}</div>`;
}
function pick(idx){
  if(answered)return;answered=true;
  const q=questions[cur];const choices=document.querySelectorAll('.choice');
  choices.forEach(c=>c.classList.add('disabled'));
  const fb=document.getElementById('fb');
  if(idx===q.correct){
    playCorrect();choices[idx].classList.add('correct');score++;streak++;
    if(streak>=3)showConfetti(15);
    fb.innerHTML=`<span style="color:#66BB6A">✅ Yes! ${q.word} → ${q.choices[q.correct]}!</span>`;
    setTimeout(()=>{fb.innerHTML+=`<div class="rule">📝 ${q.rule}</div><div class="speak">🎤 Say it: ${q.speak}</div>`;},500);
  }else{
    playWrong();choices[idx].classList.add('wrong');choices[q.correct].classList.add('correct');streak=0;
    fb.innerHTML=`<span style="color:#FF6B6B">Not quite! It's ${q.choices[q.correct]}!</span>`;
    setTimeout(()=>{fb.innerHTML+=`<div class="rule">📝 ${q.rule}</div><div class="speak">🎤 Say it: ${q.speak}</div>`;},500);
  }
  setTimeout(()=>{cur++;render()},3500);
}
function showEnd(){
  playCelebration();showConfetti(50);
  const pct=Math.round(score/questions.length*100);
  const msg=pct>=90?'Plural Champion! 🏆':pct>=70?'Great job! 🌟':pct>=50?'Getting better! 💪':'Keep practising! 🌱';
  document.getElementById('game').innerHTML=`
    <div class="celebration">🔢</div>
    <h2 style="text-align:center;color:#00838F;margin:15px 0">${msg}</h2>
    <div class="score">${'⭐'.repeat(score)}${'☆'.repeat(questions.length-score)}</div>
    <p style="text-align:center;font-size:1.3em">${score}/${questions.length} correct! (${pct}%)</p>
    <div class="speak">🎤 <strong>Challenge:</strong> Look around your room and count 5 things using plurals! "I see 3 books, 2 pencils..."</div>
    <div class="hook">
      <h3 style="color:#006064">🔮 Did you know?</h3>
      <p style="color:#00838F">Some words are REALLY tricky! "Child" becomes "children" not "childs"! "Mouse" becomes "mice" not "mouses"! English is funny! 😄</p>
    </div>
    <div style="text-align:center;margin-top:15px"><button class="btn btn-play" onclick="cur=0;score=0;streak=0;render()">Play Again!</button></div>`;
}
render();
</script></body></html>
