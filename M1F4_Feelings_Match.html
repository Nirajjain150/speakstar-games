<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SpeakStar - Feelings Match!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Trebuchet MS',Arial,sans-serif;background:linear-gradient(135deg,#E91E63,#9C27B0);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;overflow-x:hidden}
.header{text-align:center;color:#fff;margin-bottom:15px}.header h1{font-size:2.2em;text-shadow:2px 2px 4px rgba(0,0,0,.3)}
.game{background:#fff;border-radius:20px;padding:25px;max-width:700px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.2);position:relative;overflow:hidden}
.scenario{background:linear-gradient(135deg,#FFF3E0,#FFF8E1);border-radius:16px;padding:20px;margin:15px 0;text-align:center}
.scenario-text{font-size:1.3em;color:#2D3436;line-height:1.5}
.scenario-emoji{font-size:3em;margin-bottom:10px;display:block}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:15px 0}
.choice{padding:16px;border:3px solid #eee;border-radius:14px;font-size:1.1em;font-weight:bold;cursor:pointer;transition:all .25s;background:#fff;text-align:center;user-select:none}
.choice:hover{transform:scale(1.05);box-shadow:0 4px 15px rgba(0,0,0,.1)}
.choice .emoji{font-size:2em;display:block;margin-bottom:6px}
.choice.correct{border-color:#66BB6A;background:#E8F5E9;transform:scale(1.08);animation:pulse .5s}
.choice.wrong{border-color:#FF6B6B;background:#FBE9E7;animation:shake .4s}
.choice.disabled{pointer-events:none;opacity:.5}
@keyframes pulse{0%,100%{transform:scale(1.08)}50%{transform:scale(1.15)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.progress{display:flex;gap:6px;justify-content:center;margin:10px 0}
.dot{width:18px;height:18px;border-radius:50%;background:#eee;transition:all .3s}
.dot.done{background:#66BB6A}.dot.current{background:#FFD54F;transform:scale(1.3)}
.fb{text-align:center;font-size:1.3em;font-weight:bold;min-height:45px;margin:10px 0;transition:all .3s}
.score{text-align:center;font-size:1.8em;margin:8px 0}
.streak-badge{display:inline-block;background:linear-gradient(135deg,#FF6F00,#FF9800);color:#fff;padding:4px 14px;border-radius:20px;font-size:.85em;animation:bounce .5s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.btn{padding:14px 30px;border:none;border-radius:14px;font-size:1.1em;font-weight:bold;cursor:pointer;transition:all .2s;margin:5px}
.btn:hover{transform:scale(1.05)}
.btn-next{background:linear-gradient(135deg,#7E57C2,#9C27B0);color:#fff}
.celebration{font-size:3.5em;text-align:center;animation:bounce .6s ease infinite alternate}
.confetti{position:fixed;top:-10px;width:10px;height:10px;border-radius:50%;pointer-events:none;z-index:9999}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
.speak-prompt{background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border-radius:12px;padding:12px;margin:10px 0;text-align:center;border:2px dashed #66BB6A}
.speak-prompt .mic{font-size:1.5em;margin-right:8px}
.hook{background:linear-gradient(135deg,#FFF3E0,#FFE0B2);border-radius:12px;padding:15px;margin:15px 0;text-align:center;border:2px solid #FFB74D}
.hook h3{color:#E65100;font-size:1.1em;margin-bottom:5px}
.hook p{color:#F57C00;font-size:.95em}
</style>
</head>
<body>
<div class="header"><h1>😊 Feelings Match! 😊</h1><p>Match the situation to the feeling — and SAY it out loud!</p></div>
<div class="game" id="game"></div>
<script>
// Sound effects using Web Audio API (no external files needed)
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new AudioCtx()}
function playCorrect(){
  initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type='sine';o.frequency.setValueAtTime(523,audioCtx.currentTime);
  o.frequency.setValueAtTime(659,audioCtx.currentTime+.1);
  o.frequency.setValueAtTime(784,audioCtx.currentTime+.2);
  g.gain.setValueAtTime(.3,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+.4);
  o.start();o.stop(audioCtx.currentTime+.4);
}
function playWrong(){
  initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type='sawtooth';o.frequency.setValueAtTime(200,audioCtx.currentTime);
  o.frequency.setValueAtTime(150,audioCtx.currentTime+.15);
  g.gain.setValueAtTime(.15,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+.3);
  o.start();o.stop(audioCtx.currentTime+.3);
}
function playCelebration(){
  initAudio();
  [523,659,784,1047].forEach((f,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(.2,audioCtx.currentTime+i*.15);
    g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+i*.15+.3);
    o.start(audioCtx.currentTime+i*.15);o.stop(audioCtx.currentTime+i*.15+.3);
  });
}
function showConfetti(count=30){
  const colors=['#FF6B6B','#FFD54F','#66BB6A','#7E57C2','#00BCD4','#FF9800','#E91E63','#2196F3'];
  for(let i=0;i<count;i++){
    const c=document.createElement('div');c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.width=(Math.random()*8+6)+'px';c.style.height=c.style.width;
    c.style.borderRadius=Math.random()>.5?'50%':'2px';
    c.style.animation=`fall ${Math.random()*2+1.5}s linear forwards`;
    c.style.animationDelay=Math.random()*.5+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4000);
  }
}

const questions=[
  {scenario:"Your best friend just moved to another city. You won't see them every day anymore.",emoji:"😢",choices:[{feel:"Sad",emoji:"😢",correct:true},{feel:"Excited",emoji:"🤩"},{feel:"Angry",emoji:"😠"},{feel:"Tired",emoji:"😴"}],
   speakPrompt:"Say: \"I am SAD because my friend moved away.\"",funFact:"Did you know? Writing a letter to your friend can make you BOTH feel happy!"},
  {scenario:"Tomorrow is your birthday! You're getting a BIG surprise party!",emoji:"🎂",choices:[{feel:"Scared",emoji:"😨"},{feel:"Excited",emoji:"🤩",correct:true},{feel:"Sad",emoji:"😢"},{feel:"Angry",emoji:"😠"}],
   speakPrompt:"Say: \"I am EXCITED because tomorrow is my birthday!\"",funFact:"What's YOUR favourite birthday treat? Tell me!"},
  {scenario:"You hear a SUPER LOUD thunder sound in the middle of the night! BOOM!",emoji:"⛈️",choices:[{feel:"Happy",emoji:"😄"},{feel:"Tired",emoji:"😴"},{feel:"Scared",emoji:"😨",correct:true},{feel:"Excited",emoji:"🤩"}],
   speakPrompt:"Say: \"I am SCARED because the thunder is very loud!\"",funFact:"Fun fact: Thunder can't hurt you! It's just the sound of lightning stretching!"},
  {scenario:"You studied really hard for a test and got FULL MARKS! 100 out of 100!",emoji:"💯",choices:[{feel:"Happy",emoji:"😄",correct:true},{feel:"Angry",emoji:"😠"},{feel:"Scared",emoji:"😨"},{feel:"Sad",emoji:"😢"}],
   speakPrompt:"Say: \"I am HAPPY because I got full marks!\"",funFact:"You're a GENIUS! High five! ✋"},
  {scenario:"Someone took YOUR favourite toy and won't give it back!",emoji:"😤",choices:[{feel:"Happy",emoji:"😄"},{feel:"Tired",emoji:"😴"},{feel:"Excited",emoji:"🤩"},{feel:"Angry",emoji:"😠",correct:true}],
   speakPrompt:"Say: \"I am ANGRY because someone took my toy!\"",funFact:"When you feel angry, take 3 deep breaths. 🌬️ Try it now!"},
  {scenario:"You played outside ALL day — running, jumping, playing cricket. Now it's bedtime!",emoji:"🏃",choices:[{feel:"Scared",emoji:"😨"},{feel:"Tired",emoji:"😴",correct:true},{feel:"Angry",emoji:"😠"},{feel:"Sad",emoji:"😢"}],
   speakPrompt:"Say: \"I am TIRED because I played all day!\"",funFact:"Even superheroes need to sleep! Good night, SpeakStar! 🦸"},
];
let cur=0,score=0,streak=0,answered=false;
function render(){
  if(cur>=questions.length){showEnd();return}
  answered=false;const q=questions[cur];
  const dots=questions.map((_,i)=>`<div class="dot ${i<cur?'done':''} ${i===cur?'current':''}"></div>`).join('');
  document.getElementById('game').innerHTML=`
    <div class="progress">${dots}</div>
    <div style="font-size:.9em;color:#888;text-align:center">Question ${cur+1} of ${questions.length}</div>
    ${streak>=3?`<div style="text-align:center"><span class="streak-badge">🔥 ${streak} in a row!</span></div>`:''}
    <div class="scenario">
      <span class="scenario-emoji">${q.emoji}</span>
      <div class="scenario-text">${q.scenario}</div>
    </div>
    <div style="text-align:center;font-weight:bold;color:#7E57C2;margin:8px 0">How would you feel? Pick one!</div>
    <div class="choices">${q.choices.map((c,i)=>`<div class="choice" data-idx="${i}" onclick="pick(${i})"><span class="emoji">${c.emoji}</span>${c.feel}</div>`).join('')}</div>
    <div class="fb" id="fb"></div>
    <div class="score">${'⭐'.repeat(score)}${'☆'.repeat(questions.length-score)}</div>`;
}
function pick(idx){
  if(answered)return;answered=true;
  const q=questions[cur];const choices=document.querySelectorAll('.choice');
  choices.forEach(c=>c.classList.add('disabled'));
  const correctIdx=q.choices.findIndex(c=>c.correct);
  const fb=document.getElementById('fb');
  if(idx===correctIdx){
    playCorrect();choices[idx].classList.add('correct');
    score++;streak++;
    if(streak>=3)showConfetti(20);
    fb.innerHTML=`<span style="color:#66BB6A">✅ YES! You feel ${q.choices[correctIdx].feel.toUpperCase()}!</span>`;
    // Add speak prompt
    setTimeout(()=>{
      fb.innerHTML+=`<div class="speak-prompt"><span class="mic">🎤</span>${q.speakPrompt}</div><div style="font-size:.8em;color:#888;margin-top:6px">💡 ${q.funFact}</div>`;
    },600);
  }else{
    playWrong();choices[idx].classList.add('wrong');choices[correctIdx].classList.add('correct');
    streak=0;
    fb.innerHTML=`<span style="color:#FF6B6B">Not quite! The answer is ${q.choices[correctIdx].feel.toUpperCase()} ${q.choices[correctIdx].emoji}</span>`;
    setTimeout(()=>{
      fb.innerHTML+=`<div class="speak-prompt"><span class="mic">🎤</span>${q.speakPrompt}</div>`;
    },600);
  }
  setTimeout(()=>{cur++;render()},3500);
}
function showEnd(){
  playCelebration();showConfetti(50);
  const pct=Math.round(score/questions.length*100);
  const msg=pct>=90?'FEELINGS MASTER! 🏆':pct>=70?'Great job! 🌟':pct>=50?'Keep going! 💪':'Practice more! 🌱';
  document.getElementById('game').innerHTML=`
    <div class="celebration">😊</div>
    <h2 style="text-align:center;color:#E91E63;margin:15px 0">${msg}</h2>
    <div class="score">${'⭐'.repeat(score)}${'☆'.repeat(questions.length-score)}</div>
    <p style="text-align:center;font-size:1.3em;margin:10px 0">${score}/${questions.length} correct! (${pct}%)</p>
    <div class="speak-prompt">
      <span class="mic">🎤</span> <strong>SPEAKING CHALLENGE:</strong> Tell someone about 3 feelings you had TODAY using "because"!
    </div>
    <div class="hook">
      <h3>🔮 SNEAK PEEK — Next Class!</h3>
      <p>Next time we'll learn to talk about YOUR FAVOURITE THINGS for a whole minute! What's your favourite food? Game? Animal? Start thinking... you'll need to talk about it! 🍕🏏🐶</p>
    </div>
    <div style="text-align:center;margin-top:15px">
      <button class="btn btn-next" onclick="cur=0;score=0;streak=0;render()">Play Again!</button>
    </div>`;
}
render();
</script></body></html>
