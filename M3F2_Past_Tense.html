<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SpeakStar - Past Tense Challenge</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Trebuchet MS',Arial,sans-serif;background:linear-gradient(135deg,#FFA726,#FF6B6B);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
.header{text-align:center;color:#fff;margin-bottom:15px}.header h1{font-size:2em;text-shadow:2px 2px 4px rgba(0,0,0,.3)}
.game{background:#fff;border-radius:20px;padding:25px;max-width:650px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.2);text-align:center}
.card{background:#FFF3E0;border-radius:16px;padding:20px;margin:15px 0}
.present{font-size:1em;color:#888;margin-bottom:5px}
.verb{font-size:2.2em;font-weight:bold;color:#FFA726;margin:5px 0}
.arrow{font-size:1.8em;color:#FF6B6B;margin:5px 0}
.prompt{font-size:1.1em;color:#2D3436;margin:10px 0;font-weight:bold}
.choices{display:flex;gap:12px;justify-content:center;margin:20px 0;flex-wrap:wrap}
.choice{padding:14px 28px;border:3px solid #e0e0e0;border-radius:14px;font-size:1.2em;font-weight:bold;cursor:pointer;transition:all .2s;background:#fff;min-width:120px}
.choice:hover{border-color:#FFA726;background:#FFF3E0;transform:scale(1.05)}
.choice.correct{border-color:#66BB6A;background:#E8F5E9;color:#2E7D32;transform:scale(1.1)}
.choice.wrong{border-color:#FF6B6B;background:#FBE9E7;color:#C62828;animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.type-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.8em;font-weight:bold;color:#fff;margin-top:8px}
.progress{display:flex;gap:6px;justify-content:center;margin:12px 0}
.dot{width:14px;height:14px;border-radius:50%;background:#eee;transition:all .3s}
.dot.done{background:#66BB6A}.dot.wrong-dot{background:#FF6B6B}.dot.current{background:#FFD54F;transform:scale(1.3)}
.fb{font-size:1.1em;font-weight:bold;min-height:35px;margin:12px 0}
.score{font-size:1.6em;margin:8px 0}
.btn{padding:12px 28px;border:none;border-radius:12px;font-size:1em;font-weight:bold;cursor:pointer;margin:5px;transition:all .2s}
.btn:hover{transform:scale(1.05)}
.btn-next{background:#FFA726;color:#fff}
.streak{font-size:.9em;color:#FFA726;font-weight:bold;margin:5px 0}
.celebration{font-size:3em;animation:bounce .5s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.rule-box{background:#E0F7FA;border-radius:10px;padding:8px 14px;margin-top:8px;font-size:.85em;color:#00838F}
</style>
</head>
<body>
<div class="header"><h1>⏰ Past Tense Challenge ⏰</h1><p>Change TODAY words to YESTERDAY words! — SpeakStar Level 1</p></div>
<div class="game" id="game"></div>
<script>
const questions=[
  {present:"jump",choices:["jumped","jumpted","jumps"],correct:0,type:"regular",rule:"Just add -ed!",past:"jumped"},
  {present:"play",choices:["plaied","played","plays"],correct:1,type:"regular",rule:"Just add -ed!",past:"played"},
  {present:"eat",choices:["eated","eating","ate"],correct:2,type:"irregular",rule:"Tricky! eat → ate (no rules, just remember!)",past:"ate"},
  {present:"dance",choices:["danceed","danced","dancing"],correct:1,type:"regular",rule:"Already ends in 'e', so just add -d!",past:"danced"},
  {present:"go",choices:["goed","goes","went"],correct:2,type:"irregular",rule:"Tricky! go → went (no rules, just remember!)",past:"went"},
  {present:"clap",choices:["claped","clapped","claping"],correct:1,type:"regular",rule:"Double the 'p', then add -ed!",past:"clapped"},
  {present:"run",choices:["runned","ran","runed"],correct:1,type:"irregular",rule:"Tricky! run → ran (no rules, just remember!)",past:"ran"},
  {present:"cry",choices:["cryed","cryed","cried"],correct:2,type:"regular",rule:"Change 'y' to 'i', then add -ed!",past:"cried"},
  {present:"sleep",choices:["sleeped","slept","sleeping"],correct:1,type:"irregular",rule:"Tricky! sleep → slept (no rules, just remember!)",past:"slept"},
  {present:"walk",choices:["walked","walkt","walking"],correct:0,type:"regular",rule:"Just add -ed!",past:"walked"},
];
let cur=0,score=0,streak=0,answered=false,results=[];
function render(){
  if(cur>=questions.length){showEnd();return}
  answered=false;const q=questions[cur];
  const dots=questions.map((_,i)=>`<div class="dot ${i<cur?(results[i]?'done':'wrong-dot'):''} ${i===cur?'current':''}"></div>`).join('');
  document.getElementById('game').innerHTML=`
    <div class="progress">${dots}</div>
    <div style="font-size:.9em;color:#888">Question ${cur+1} of ${questions.length}</div>
    ${streak>=3?`<div class="streak">🔥 ${streak} in a row!</div>`:''}
    <div class="card">
      <div class="present">TODAY I say:</div>
      <div class="verb">${q.present}</div>
      <div class="arrow">⬇️</div>
      <div class="prompt">YESTERDAY I said:</div>
      <div class="verb" id="answer" style="color:#ccc">???</div>
      <span class="type-badge" style="background:${q.type==='regular'?'#00BCD4':'#FF6B6B'}">${q.type==='regular'?'Regular (-ed)':'Tricky! (irregular)'}</span>
    </div>
    <div class="choices">${q.choices.map((c,i)=>`<div class="choice" onclick="pick(${i})">${c}</div>`).join('')}</div>
    <div class="fb" id="fb"></div>
    <div class="score">${'⭐'.repeat(score)}${'☆'.repeat(questions.length-score)}</div>`;
}
function pick(idx){
  if(answered)return;answered=true;
  const q=questions[cur];const choices=document.querySelectorAll('.choice');
  choices.forEach(c=>c.style.pointerEvents='none');
  const fb=document.getElementById('fb');
  if(idx===q.correct){
    choices[idx].classList.add('correct');
    document.getElementById('answer').textContent=q.past;
    document.getElementById('answer').style.color='#66BB6A';
    fb.innerHTML=`<span style="color:#66BB6A">✔ Correct!</span><div class="rule-box">📝 ${q.rule}</div>`;
    score++;streak++;results.push(true);
  }else{
    choices[idx].classList.add('wrong');choices[q.correct].classList.add('correct');
    document.getElementById('answer').textContent=q.past;
    document.getElementById('answer').style.color='#FF6B6B';
    fb.innerHTML=`<span style="color:#FF6B6B">✘ It's "${q.past}"!</span><div class="rule-box">📝 ${q.rule}</div>`;
    streak=0;results.push(false);
  }
  setTimeout(()=>{cur++;render()},2200);
}
function showEnd(){
  const pct=Math.round(score/questions.length*100);
  const msg=pct>=90?'PAST TENSE MASTER! 🏆':pct>=70?'Great job! 🌟':pct>=50?'Good effort! Keep going! 💪':'Keep practising! You\'ll get it! 🌱';
  const reg=results.filter((_,i)=>questions[i].type==='regular').filter(r=>r).length;
  const irr=results.filter((_,i)=>questions[i].type==='irregular').filter(r=>r).length;
  document.getElementById('game').innerHTML=`
    <div class="celebration">⏰</div>
    <h2 style="color:#FFA726;margin:15px 0">${msg}</h2>
    <div class="score">${'⭐'.repeat(score)}${'☆'.repeat(questions.length-score)}</div>
    <p style="font-size:1.3em;margin:10px 0">${score}/${questions.length} correct! (${pct}%)</p>
    <div style="display:flex;gap:20px;justify-content:center;margin:15px 0">
      <div style="background:#E0F7FA;padding:12px 20px;border-radius:12px">
        <div style="font-size:.8em;color:#888">Regular (-ed)</div>
        <div style="font-size:1.4em;font-weight:bold;color:#00BCD4">${reg}/6</div>
      </div>
      <div style="background:#FBE9E7;padding:12px 20px;border-radius:12px">
        <div style="font-size:.8em;color:#888">Tricky (irregular)</div>
        <div style="font-size:1.4em;font-weight:bold;color:#FF6B6B">${irr}/4</div>
      </div>
    </div>
    <div style="margin-top:20px">
      <button class="btn btn-next" onclick="cur=0;score=0;streak=0;results=[];render()">Play Again!</button>
    </div>`;
}
render();
</script></body></html>
